<nav class="site-nav">
  <div class="nav-inner">
    {% for item in site.navigation %}
      <a href="{{ item.url }}" class="nav-link{% if page.url == item.url %} active{% endif %}">{{ item.title }}</a>
    {% endfor %}
  </div>
</nav>

<style>
  .site-nav {
    background: rgba(21, 87, 100, 0.92);
    border-bottom: 1px solid rgba(255,255,255,0.12);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(6px);
  }
  .nav-inner {
    max-width: 64rem;
    margin: 0 auto;
    padding: 0 2rem;
    display: flex;
    gap: 0.25rem;
    align-items: center;
    height: 3rem;
  }
  .nav-link {
    color: rgba(255,255,255,0.82);
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 0.35rem 0.75rem;
    border-radius: 4px;
    transition: background 0.15s, color 0.15s;
  }
  .nav-link:hover,
  .nav-link.active {
    background: rgba(255,255,255,0.14);
    color: #fff;
    text-decoration: none;
  }
</style>
